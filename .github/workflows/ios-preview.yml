name: iOS Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: ios-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Build and deploy preview
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: macos-26
    permissions:
      contents: read
      pull-requests: write
    env:
      CI: true
      APP_IDENTIFIER: chris.MusicWall
      DEVELOPMENT_TEAM: CD8XP2U645
      BUILD_NUMBER: ${{ github.run_number }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
    steps:
      - name: Check for no-deploy label
        id: labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = context.payload.pull_request.labels.map((l) => l.name);
            return labels.includes('no-deploy');
          result-encoding: string

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Configure SSH for match
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Add GitHub to known_hosts
        run: ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Simulator build (no-deploy)
        if: steps.labels.outputs.result == 'true'
        run: bundle exec fastlane ci_build

      - name: TestFlight preview
        if: steps.labels.outputs.result != 'true'
        run: bundle exec fastlane preview

      - name: Comment on PR (TestFlight)
        if: steps.labels.outputs.result != 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const build = process.env.BUILD_NUMBER;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              '### iOS Preview (TestFlight internal)',
              '',
              `Build number: **${build}**`,
              '',
              'Install from TestFlight when Apple finishes processing (usually 10–20 minutes).',
              '',
              `[View workflow run](${runUrl})`
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const marker = '<!-- ios-preview-comment -->';
            const existing = comments.find((c) => c.body?.includes(marker));
            const fullBody = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body: fullBody,
              });
            }

      - name: Comment on PR (simulator only)
        if: steps.labels.outputs.result == 'true' && success()
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const marker = '<!-- ios-preview-comment -->';
            const body = [
              marker,
              '### iOS Preview (simulator build only)',
              '',
              'PR has label `no-deploy` — skipped TestFlight upload.',
              '',
              `[View workflow run](${runUrl})`
            ].join('\n');
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });
            const existing = comments.find((c) => c.body?.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }
