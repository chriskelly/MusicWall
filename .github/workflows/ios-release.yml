name: iOS Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Marketing version to release (e.g. 1.2.0 — no leading v)
        required: true
        type: string

jobs:
  release:
    name: App Store release
    runs-on: macos-26
    env:
      CI: true
      APP_IDENTIFIER: chris.MusicWall
      DEVELOPMENT_TEAM: CD8XP2U645
      BUILD_NUMBER: ${{ github.run_number }}
      MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
      MATCH_GIT_URL: ${{ secrets.MATCH_GIT_URL }}
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_API_KEY_CONTENT }}
    steps:
      - name: Resolve release version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          if [[ -z "$VERSION" ]]; then
            echo "Release version is required (tag v1.2.3 or workflow_dispatch version input)." >&2
            exit 1
          fi
          if [[ "$VERSION" == "$GITHUB_REF_NAME" && "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            echo "Tag must look like v1.2.3 (got: $GITHUB_REF_NAME)" >&2
            exit 1
          fi
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Version must look like 1.2.0 (got: $VERSION)" >&2
            exit 1
          fi
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION (event: ${{ github.event_name }})"

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Configure SSH for match
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.MATCH_GIT_PRIVATE_KEY }}

      - name: Add GitHub to known_hosts
        run: ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts

      - name: Release to App Store
        run: bundle exec fastlane release
